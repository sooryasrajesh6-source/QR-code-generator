<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f9;
    }
    input {
      padding: 10px;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      margin-left: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
    #qrcode {
      margin-top: 20px;
    }
    img {
      margin-top: 15px;
      border: 2px solid #333;
      padding: 10px;
      background: white;
    }
  </style>
</head>
<body>
  <h1>QR Code Generator</h1>
  <input type="text" id="text" placeholder="Enter text or URL">
  <button onclick="generateQR()">Generate QR</button>

  <div id="qrcode"></div>

  <script>
    function generateQR() {
      let text = document.getElementById("text").value;
      if (text.trim() === "") {
        alert("Please enter text or URL!");
        return;
      }
      let qrCodeAPI = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(text);
      document.getElementById("qrcode").innerHTML = "<img src='" + qrCodeAPI + "' alt='QR Code'>";
    }
  </script>
</body>
</html>
